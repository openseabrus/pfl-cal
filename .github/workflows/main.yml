name: GitHub Self-Updating Repository

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */4 * * *"

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        # https://github.com/actions/checkout/tree/v3.0.2
        uses: actions/checkout@v4
        with:
          ref: ics
      - name: Create PFL.ics
        run: |
          npm install
          npm start
      - name: Push to repository
        run: |
          git config --global user.name "openseabrus"
          git config --global user.email "openseabrus@users.noreply.github.com"
          git add -f PFL.ics
          git commit -m "Update PFL.ics" || echo "No changes to commit"
          git push -u origin ics
